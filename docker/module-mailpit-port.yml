services:
  mailpit-chatbot:
    image: axllent/mailpit:latest
    container_name: mailpit-chatbot
    restart: always
    environment:
      - MP_MAX_MESSAGES=5000
      - MP_DATABASE=/data/mailpit.db
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
      - TZ=America/Sao_Paulo
    ports:
      - "8025:8025"
    volumes:
      - mailpit_data:/data
    networks:
      - rede_proxy
      - rede_chatbot

volumes:
  mailpit_data:
